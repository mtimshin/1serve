name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Including master in case it's the default

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Static build
        run: npm run generate || npm run build # Common static build commands for Nuxt/Vue

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Assuming the static output is in 'dist' or '.output/public'
          path: './dist' # Update this if your build output is different (e.g., .output/public for Nuxt)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
